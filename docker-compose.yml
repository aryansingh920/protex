services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka_official
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: postgres_db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./database/schema/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  node-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api_service
    ports:
      - "${API_PORT}:8080"
    env_file:
      - ./.env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-ingestor:
    build:
      context: .
      dockerfile: service/ingestor/Dockerfile.ingestor
    container_name: python_ingestor
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      PYTHONPATH: /app
    volumes:
      - ./database:/app/database
      - ./service:/app/service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  python-consumer:
    build:
      context: .
      dockerfile: service/consumer/Dockerfile.consumer
    container_name: python_consumer
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      PYTHONPATH: /app
    volumes:
      - ./service:/app/service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  client:
    build:
      context: .
      dockerfile: client/Dockerfile.client
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: react_client
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      - node-api
    restart: unless-stopped

  ws-service:
    build:
      context: .
      dockerfile: service/ws/Dockerfile.websocket
    container_name: ws_service
    ports:
      - "${WS_PORT}:${WS_PORT}"
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      PYTHONPATH: /app
    volumes:
      - ./service:/app/service
      - ./database:/app/database
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
