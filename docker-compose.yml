services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka_official
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./database/schema/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-api:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway_service
    ports:
      - "${GATEWAY_PORT}:8080"
    env_file:
      - ./.env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  python-ingestor:
    build:
      context: .                          # project root — gives access to service/ and database/
      dockerfile: service/Dockerfile.ingestor
    container_name: python_ingestor
    env_file:
      - ./.env                            # injects DB_*, KAFKA_* etc. into the container
    environment:
      - DB_HOST=postgres                  # override localhost → Docker service name
    volumes:
      # Mount SQL files so ingestor.py can open("ingestorInsert.sql") at runtime
      - ./database:/app/database
      # Mount the whole service dir so you can edit scripts without rebuilding
      - ./service:/app/service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure                   
